<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Sentence Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-bg: #276b70; 
            --btn-height: 46px; 
        }
        body {
            font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none; 
            background-color: #f4f6f8;
        }
        
        .exam-body { background-color: #7b7b7b !important; }
        
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .top-bar {
            background-color: var(--primary-bg);
            height: 80px; 
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 32px;
            gap: 16px;
        }
        .sub-bar {
            background-color: #f7f7f7;
            border-bottom: 1px solid #d5d5d5;
            height: 52px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            font-weight: 600;
            color: #333;
            font-size: 16px; 
        }
        
        .tpo-btn {
            height: var(--btn-height);
            border-radius: 23px;
            padding: 0 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .btn-outline:hover { background-color: rgba(255,255,255,0.15); border-color: white; }
        .btn-solid {
            background-color: white;
            color: var(--primary-bg);
            border: 1px solid white;
        }
        .btn-solid:hover { background-color: #f0f0f0; }
        
        .question-area {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .sentence-flow {
            font-size: 20px;
            line-height: 2.2;
            color: #111;
            display: inline;
        }
        .static-word { display: inline; }
        
        /* 彻底移除 margin，让填入的内容紧密贴合 */
        .drop-slot {
            display: inline-block;
            min-width: 60px;
            color: transparent;
            border-bottom: 2px solid #334155;
            cursor: pointer;
            position: relative;
            margin: 0; 
            padding: 0;
            top: -2px;
        }
        .drop-slot.drag-over { border-bottom: 2px solid var(--primary-bg); }
        
        /* 彻底移除 padding 和 margin，防止产生多余空格 */
        .filled-word {
            display: inline;
            color: #000;
            cursor: pointer;
            padding: 0;
            margin: 0;
            border-radius: 2px;
            transition: background-color 0.1s;
        }
        .filled-word:hover { background-color: #e5e7eb; }
        
        /* 默认透明，只在 hover 时显示阴影 */
        .pool-option {
            background-color: transparent;
            color: #000;
            padding: 8px 16px;
            font-size: 19px;
            cursor: pointer;
            display: inline-block;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .pool-option:hover { background-color: #e5e7eb; }
        .pool-option.dragging { opacity: 0.3; }

        .review-table-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            background-color: #fff;
            padding: 40px 100px;
        }
        .review-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #ccc;}
        .review-table th, .review-table td { border: 1px solid #ccc; padding: 14px 20px; text-align: left; }
        .review-table th {
            position: sticky; top: 0; background-color: #f9f9f9;
            cursor: pointer; font-weight: bold; color: #111; z-index: 10;
        }
        .review-table th:hover { background-color: #f1f1f1; }
        .review-table tr { cursor: pointer; transition: background 0.1s; }
        .review-table tr:hover { background-color: #f4f4f4; }
        .review-table tr.selected { background-color: #e6f7ff; }

        .hidden-file-input { display: none; }
        
        .upload-overlay {
            position: fixed; inset: 0; background: #f4f6f8; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .drop-zone {
            width: 600px; height: 300px; border: 2px dashed #a0aec0; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: white; cursor: pointer; transition: 0.3s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary-bg); background: #f0f7f8;
        }

        .calendar-month { font-size: 20px; font-weight: bold; color: #1e3a8a; margin: 30px 0 15px 0; border-left: 4px solid #3b82f6; padding-left: 10px;}
        .calendar-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .calendar-card {
            background: white; border: 1px solid #f3f4f6; border-radius: 16px; width: 125px; height: 105px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .calendar-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); border-color: #e5e7eb; }
        .cal-day { font-size: 19px; font-weight: bold; color: #111; }
        .cal-count { font-size: 12px; color: #6b7280; margin-top: 4px; font-weight: 500; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body id="main-body">

<div id="app"></div>

<script>
    const iconReview = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="margin-right:2px"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>`;
    const iconBack = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M15 18l-6-6 6-6"/></svg>`;
    const iconNext = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M9 18l6-6-6-6"/></svg>`;
    const iconEye = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const iconEyeOff = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    const avatars = {
        m: ["https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/ZaO9/231X234/%E4%BA%BA%E5%83%8Fimage/m1.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/VkD2/231X231/%E4%BA%BA%E5%83%8Fimage/m2.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/3Nq2/228X234/%E4%BA%BA%E5%83%8Fimage/m3.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/HJVm/237X252/%E4%BA%BA%E5%83%8Fimage/m4.png/webp"],
        f: ["https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/Zyah/291X289/%E4%BA%BA%E5%83%8Fimage/f1.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/X77O/285X294/%E4%BA%BA%E5%83%8Fimage/f2.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/Eg9O/282X291/%E4%BA%BA%E5%83%8Fimage/f3.png/webp", "https://img.pagehost.cn/autoupload/en/QJ7p-s1WNkxecofvMmbqoifNcKcqEnRmcljopnyJoMs/20260616/QKh3/291X309/%E4%BA%BA%E5%83%8Fimage/f4.png/webp"]
    };

    let fullDatabase = []; 
    let uniqueDatabase = []; 
    let moduleNames = []; 

    let state = {
        screen: 'upload', 
        mode: 'practice', 
        questions: [],
        currentQIndex: 0,
        answers: {}, 
        totalTime: 0, 
        timeRemaining: 0,
        timerInterval: null,
        timeHidden: false,
        testFinished: false,
        showAnswerOverlay: false, 
        checkActive: false,
        sortConfig: { key: 'number', direction: 'asc' },
        selectedReviewRow: null,
        draggedOptId: null,
        sourceSlotId: null,
        currentHistoryRecord: null,
        timeSpent: {},
        lastScreenBeforeReview: null,
        dataDashDate: '' 
    };

    const appEl = document.getElementById('app');
    const mainBody = document.getElementById('main-body');

    function parseMDData(mdText) {
        fullDatabase = [];
        uniqueDatabase = [];
        moduleNames = [];
        const uniqueMap = new Map();

        const modules = mdText.split('——————————').map(s => s.trim()).filter(s => s);
        modules.forEach(modText => {
            const lines = modText.split('\n').map(s => s.trim()).filter(s => s);
            const moduleDate = lines[0]; 
            if(!moduleNames.includes(moduleDate)) moduleNames.push(moduleDate);
            
            let currentQ = null;
            for(let i=1; i<lines.length; i++) {
                const line = lines[i];
                if(line.startsWith('q')) {
                    if(currentQ) processQuestion(currentQ, uniqueMap);
                    currentQ = { id: moduleDate + '_' + line, moduleId: moduleDate, qNum: line };
                } else if (line.startsWith('sen1:')) {
                    currentQ.topText = line.substring(5).trim();
                } else if (line.startsWith('sen2:')) {
                    currentQ.sen2Str = line.substring(5).trim();
                } else if (line.startsWith('options:')) {
                    currentQ.optionsRaw = line.substring(8).trim();
                } else if (line.startsWith('ans:')) {
                    currentQ.ans = line.substring(4).trim();
                }
            }
            if(currentQ) processQuestion(currentQ, uniqueMap);
        });
        
        uniqueDatabase = Array.from(uniqueMap.values());
        state.dataDashDate = moduleNames[0] || '';
        state.screen = 'dashboard';
        render();
    }

    function processQuestion(q, uniqueMap) {
        if (!q.optionsRaw || !q.ans) return;
        const optsArr = q.optionsRaw.split('|').map(s => s.replace(/`/g, '').trim());
        q.options = optsArr.map((text, idx) => ({ id: 'opt_' + idx, text: text }));
        
        q.structure = [];
        let bIdx = 0;
        const regex = /(_+)/g;
        let lastIndex = 0;
        let match;
        while ((match = regex.exec(q.sen2Str)) !== null) {
            const staticText = q.sen2Str.substring(lastIndex, match.index);
            if (staticText) q.structure.push({ type: 'static', text: staticText });
            q.structure.push({ type: 'blank', id: 'b' + bIdx++ });
            lastIndex = regex.lastIndex;
        }
        const tail = q.sen2Str.substring(lastIndex);
        if (tail) q.structure.push({ type: 'static', text: tail });

        q.correctAnswers = {};
        const blanks = q.structure.filter(s => s.type === 'blank');
        const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');
        const target = normalize(q.ans);
        
        let found = false, used = new Set(), currentFill = [];
        function solve(index) {
            if(found) return;
            if(index === blanks.length) {
                let built = '', fillIndex = 0;
                q.structure.forEach(s => {
                    if(s.type === 'static') built += s.text;
                    else built += currentFill[fillIndex++].text;
                });
                if(normalize(built) === target) {
                    found = true;
                    currentFill.forEach((opt, i) => q.correctAnswers[blanks[i].id] = opt.id);
                }
                return;
            }
            for(let i=0; i<q.options.length; i++) {
                if(!used.has(i)) {
                    used.add(i); currentFill.push(q.options[i]);
                    solve(index + 1);
                    currentFill.pop(); used.delete(i);
                }
            }
        }
        solve(0);
        if(!found) blanks.forEach((b, i) => q.correctAnswers[b.id] = q.options[i].id);

        fullDatabase.push(q);

        const hash = q.topText + '|||' + q.sen2Str;
        if(uniqueMap.has(hash)) {
            let eq = uniqueMap.get(hash);
            eq.frequency++;
            if(!eq.occurrences.includes(q.moduleId)) eq.occurrences.push(q.moduleId);
        } else {
            uniqueMap.set(hash, { ...q, frequency: 1, occurrences: [q.moduleId] });
        }
    }

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => parseMDData(e.target.result);
        reader.readAsText(file);
    }
    function onFileDrop(e) {
        e.preventDefault(); e.currentTarget.classList.remove('drag-over');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    }

    function saveHistory(score, timeSpent) {
        const history = JSON.parse(localStorage.getItem('toefl_history') || '[]');
        const record = {
            id: new Date().getTime(),
            dateStr: new Date().toLocaleString(),
            mode: state.mode,
            total: state.questions.length,
            score: score,
            timeSpent: timeSpent,
            questions: state.questions,
            answers: state.answers,
            timeSpentPerQ: state.timeSpent,
            moduleId: state.mode === 'mock' ? state.questions[0].moduleId : 'Mixed Practice'
        };
        history.unshift(record);
        localStorage.setItem('toefl_history', JSON.stringify(history));
        state.currentHistoryRecord = record;
    }
    
    function downloadTXT(recordObj) {
        const record = recordObj || state.currentHistoryRecord;
        let content = `TOEFL Build a Sentence - ${record.mode === 'mock' ? 'Mock Exam' : 'Practice'} Log\nDate: ${record.dateStr}\nScore: ${record.score}/${record.total}\n\n`;
        
        record.questions.forEach((q, idx) => {
            let isCorrect = true;
            let userStr = "", correctStr = "";
            let timeForQ = record.timeSpentPerQ ? record.timeSpentPerQ[q.id] || 0 : 0;
            
            q.structure.forEach((slot, sIdx) => {
                if(slot.type === 'static') {
                    userStr += slot.text; correctStr += slot.text;
                } else {
                    const ansId = record.answers[q.id][slot.id];
                    if(ansId !== q.correctAnswers[slot.id]) isCorrect = false;

                    const opt = q.options.find(o => o.id === ansId);
                    let w = opt ? opt.text : "________";
                    if(sIdx === 0 && opt) w = w.charAt(0).toUpperCase() + w.slice(1);
                    userStr += `[${w}]`; 
                    
                    const cOptId = q.correctAnswers[slot.id];
                    const cOpt = q.options.find(o => o.id === cOptId);
                    let cw = cOpt ? cOpt.text : "________";
                    if(sIdx === 0 && cOpt) cw = cw.charAt(0).toUpperCase() + cw.slice(1);
                    correctStr += `[${cw}]`; 
                }
            });
            
            let timeStr = record.mode === 'mock' ? ` - 耗时 ${formatTime(timeForQ)}` : '';
            content += `Q${idx + 1}${timeStr} - 你的答案: ${userStr.trim().replace(/\s+/g, ' ')} - 正确答案: ${correctStr.trim().replace(/\s+/g, ' ')} - 结果: ${isCorrect ? '正确' : '错误'}\n`;
        });

        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `TOEFL_Log_${record.id}.txt`;
        a.click();
    }

    function viewHistoryDetail(id) {
        const history = JSON.parse(localStorage.getItem('toefl_history') || '[]');
        const record = history.find(r => String(r.id) === String(id));
        if(record) {
            state.currentHistoryRecord = record;
            state.screen = 'history_detail';
            render();
        }
    }

    function redoQuestionFromHistory(recordId, qIdx) {
        const history = JSON.parse(localStorage.getItem('toefl_history') || '[]');
        const record = history.find(r => String(r.id) === String(recordId));
        if (record && record.questions[qIdx]) {
            state.mode = 'practice';
            setupExamData([record.questions[qIdx]], 0);
        }
    }

    function startPractice(sortType) {
        state.mode = 'practice';
        let qList = [];
        if (sortType === 'asc' || sortType === 'random') {
            qList = [...fullDatabase]; 
        } else {
            qList = [...uniqueDatabase]; 
        }
        
        if (sortType === 'random') qList.sort(() => Math.random() - 0.5);
        else if (sortType === 'freq_desc') qList.sort((a,b) => b.frequency - a.frequency);
        else if (sortType === 'freq_asc') qList.sort((a,b) => a.frequency - b.frequency);
        
        setupExamData(qList, 0); 
    }

    function startMock(moduleId) {
        state.mode = 'mock';
        let qList = fullDatabase.filter(q => q.moduleId === moduleId);
        setupExamData(qList, 6 * 60 + 50); 
    }

    function setupExamData(qList, time) {
        state.questions = qList;
        state.totalTime = time;
        state.timeRemaining = time;
        state.answers = {};
        state.timeSpent = {};
        state.questions.forEach(q => {
            state.answers[q.id] = {};
            state.timeSpent[q.id] = 0;
            const all = [...avatars.m, ...avatars.f];
            const i1 = Math.floor(Math.random() * all.length);
            let i2 = Math.floor(Math.random() * all.length);
            while(i2 === i1) i2 = Math.floor(Math.random() * all.length);
            q.avatar1 = all[i1];
            q.avatar2 = all[i2];
        });
        state.currentQIndex = 0;
        state.testFinished = false;
        state.showAnswerOverlay = false;
        state.checkActive = false;
        
        if (state.mode === 'mock') {
            state.screen = 'intro';
        } else {
            state.screen = 'testing';
        }
        startTimer();
        render();
    }

    function startTimer() {
        if(state.timerInterval) clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            if (!state.testFinished) {
                if (state.screen === 'testing' || state.screen === 'post_review') {
                    const qId = state.questions[state.currentQIndex].id;
                    state.timeSpent[qId] = (state.timeSpent[qId] || 0) + 1;
                }

                if (state.mode === 'mock') {
                    if(state.timeRemaining > 0) {
                        state.timeRemaining--;
                        const el = document.getElementById('timer-txt');
                        if(el && !state.timeHidden) el.innerText = formatTime(state.timeRemaining);
                        const revEl = document.getElementById('review-timer-txt');
                        if(revEl && !state.timeHidden) revEl.innerText = formatTime(state.timeRemaining);
                    } else {
                        finishExam();
                    }
                }
            }
        }, 1000);
    }

    function beginExam() {
        state.screen = 'testing';
        render();
    }

    function checkAnswer() {
        state.checkActive = true;
        render();
    }

    function exitPractice() {
        const attemptedQs = state.questions.filter(q => Object.keys(state.answers[q.id]).length > 0 || state.timeSpent[q.id] > 0);
        if (attemptedQs.length > 0) {
            let score = 0;
            attemptedQs.forEach(q => {
                let correct = true;
                q.structure.forEach(s => {
                    if(s.type === 'blank' && state.answers[q.id][s.id] !== q.correctAnswers[s.id]) correct = false;
                });
                if(correct) score++;
            });
            const originalQs = state.questions;
            state.questions = attemptedQs;
            saveHistory(score, 0); 
            state.questions = originalQs;
        }
        if(state.timerInterval) clearInterval(state.timerInterval);
        state.screen = 'dashboard';
        render();
    }

    function finishExam() {
        if(state.timerInterval) clearInterval(state.timerInterval);
        state.testFinished = true;
        let score = 0;
        
        const attemptedQs = state.questions.filter(q => Object.keys(state.answers[q.id] || {}).length > 0 || state.timeSpent[q.id] > 0);
        state.questions.forEach(q => {
            let correct = true;
            q.structure.forEach(s => {
                if(s.type === 'blank' && state.answers[q.id][s.id] !== q.correctAnswers[s.id]) correct = false;
            });
            if(correct) score++;
        });
        
        let timeSpent = state.mode === 'mock' ? (state.totalTime - state.timeRemaining) : 0;
        
        if (state.mode === 'practice' && attemptedQs.length === 0) {
             state.screen = 'dashboard';
             render();
             return;
        }
        
        saveHistory(score, timeSpent);
        state.screen = 'history_detail';
        render();
    }

    function goNext() {
        if (state.currentQIndex < state.questions.length - 1) {
            state.currentQIndex++;
            state.showAnswerOverlay = false;
            state.checkActive = false;
            render();
        } else {
            state.screen = 'end';
            render();
        }
    }

    function goBack() {
        if (state.currentQIndex > 0) {
            state.currentQIndex--;
            state.showAnswerOverlay = false;
            state.checkActive = false;
            render();
        }
    }

    // ========== 完整恢复的 Review 界面核心逻辑 ==========
    function goToReview() {
        state.lastScreenBeforeReview = state.screen;
        state.screen = 'review_grid';
        render();
    }

    function handleReturnFromReview() {
        if (state.testFinished) {
            state.screen = 'history_detail';
        } else {
            state.screen = state.lastScreenBeforeReview || 'testing';
        }
        render();
    }

    function sortReview(key) {
        if (state.sortConfig.key === key) {
            state.sortConfig.direction = state.sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            state.sortConfig.key = key;
            state.sortConfig.direction = 'asc';
        }
        render();
    }
    // ==================================================

    function handleOptionClick(optId) {
        if(state.testFinished) return;
        const q = state.questions[state.currentQIndex];
        const emptySlot = q.structure.find(s => s.type === 'blank' && !state.answers[q.id][s.id]);
        if(emptySlot) {
            state.answers[q.id][emptySlot.id] = optId;
            state.checkActive = false;
            render();
        }
    }
    function handleSlotClick(slotId) {
        if(state.testFinished) return;
        const qId = state.questions[state.currentQIndex].id;
        if(state.answers[qId][slotId]) {
            delete state.answers[qId][slotId];
            state.checkActive = false;
            render();
        }
    }
    function onDragStart(e, optId, sourceSlot) {
        if(state.testFinished) return;
        state.draggedOptId = optId; state.sourceSlotId = sourceSlot;
        e.dataTransfer.setData('text/plain', optId);
        setTimeout(() => e.target.classList.add('dragging'), 0);
    }
    function onDragEnd(e) {
        e.target.classList.remove('dragging');
        state.draggedOptId = null; state.sourceSlotId = null;
        render();
    }
    function onDragOver(e) {
        e.preventDefault();
        if(state.testFinished) return;
        if(e.currentTarget.classList.contains('drop-slot') || e.currentTarget.id === 'options-pool') {
            e.currentTarget.classList.add('drag-over');
        }
    }
    function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function onDropSlot(e, targetSlotId) {
        e.preventDefault(); e.currentTarget.classList.remove('drag-over');
        if(state.testFinished) return;
        const qId = state.questions[state.currentQIndex].id;
        const existingId = state.answers[qId][targetSlotId];
        if (existingId) {
            if (state.sourceSlotId) {
                state.answers[qId][state.sourceSlotId] = existingId;
                state.answers[qId][targetSlotId] = state.draggedOptId;
            } else state.answers[qId][targetSlotId] = state.draggedOptId;
        } else {
            if (state.sourceSlotId) delete state.answers[qId][state.sourceSlotId];
            state.answers[qId][targetSlotId] = state.draggedOptId;
        }
        state.checkActive = false;
        render();
    }
    function onDropPool(e) {
        e.preventDefault(); e.currentTarget.classList.remove('drag-over');
        if(state.testFinished || !state.sourceSlotId) return;
        const qId = state.questions[state.currentQIndex].id;
        delete state.answers[qId][state.sourceSlotId];
        state.checkActive = false;
        render();
    }

    function formatTime(s) {
        const m = Math.floor(s / 60).toString().padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        return `${m}:${sec}`;
    }

                let dStr = parts[2];
                let dNum = dStr.match(/\d+/)[0]; 
                
                // 智能提取后缀字母 (如 A, B, C)，不加“卷”字
                let letterMatch = dStr.match(/[A-Za-z]+/);
                let letter = letterMatch ? ' ' + letterMatch[0].toUpperCase() : '';
                
                let mKey = `${y}年${mon}月`;
                if(!monthsObj[mKey]) monthsObj[mKey] = [];
                let count = fullDatabase.filter(q => q.moduleId === m).length;
                
                // 组装显示文本，例如 "1日 B"
                monthsObj[mKey].push({ id: m, day: dNum + '日' + letter, count: count });
            }
        });

        let html = `
            <div class="w-full min-h-screen bg-[#f4f6f8] p-10 pb-20">
                <div class="max-w-5xl mx-auto bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center border-b pb-6 mb-4">
                        <div>
                            <h2 class="text-3xl font-bold text-[#111] mb-2">按考试日期模考</h2>
                            <p class="text-gray-500">点击对应的考试日期即可开启该场的完整模考。</p>
                        </div>
                        <button onclick="state.screen='dashboard'; render()" class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">返回主界面</button>
                    </div>
        `;
        
        for(let month in monthsObj) {
            html += `<div class="calendar-month">${month}</div><div class="calendar-grid">`;
            monthsObj[month].forEach(mod => {
                let qCountText = mod.count === 10 ? '10题完整版' : `共 ${mod.count} 题`;
                html += `<div class="calendar-card" onclick="startMock('${mod.id}')">
                            <div class="cal-day text-slate-800 font-extrabold text-md">${mod.day}</div>
                            <div class="cal-count text-emerald-600 font-semibold">${qCountText}</div>
                         </div>`;
            });
            html += `</div>`;
        }
        
        html += `</div></div>`;
        return html;
    }

    function renderTopBar() {
        let btns = '';
        if (state.screen === 'intro') {
            btns = `<button class="tpo-btn btn-solid" onclick="beginExam()">Begin ${iconNext}</button>`;
        } else if (state.screen === 'end') {
            btns = `
                <button class="tpo-btn btn-outline" onclick="state.screen='testing'; state.currentQIndex=state.questions.length-1; render();">${iconBack} Back</button>
                <button class="tpo-btn btn-solid" onclick="finishExam()">Next ${iconNext}</button>
            `;
        } else if (state.screen === 'testing') {
            if(state.mode === 'practice') {
                btns = `
                    <button class="tpo-btn btn-outline" style="margin-right:auto" onclick="exitPractice()">${iconBack} Home</button>
                    <button class="tpo-btn btn-outline" onclick="checkAnswer()">Check</button>
                    <button class="tpo-btn btn-outline" onclick="state.showAnswerOverlay = !state.showAnswerOverlay; render();">${state.showAnswerOverlay ? 'Hide Answer' : 'Show Answer'}</button>
                    ${state.currentQIndex > 0 ? `<button class="tpo-btn btn-outline" onclick="goBack()">${iconBack} Back</button>` : ''}
                    <button class="tpo-btn btn-solid" onclick="goNext()">Next ${iconNext}</button>
                `;
            } else { 
                btns = `
                    <button class="tpo-btn btn-outline" onclick="goToReview()">${iconReview} Review</button>
                    ${state.currentQIndex > 0 ? `<button class="tpo-btn btn-outline" onclick="goBack()">${iconBack} Back</button>` : ''}
                    <button class="tpo-btn btn-solid" onclick="goNext()">Next ${iconNext}</button>
                `;
            }
        }

        const top = `<div class="top-bar">${btns}</div>`;
        
        let sub = '';
        if (state.screen === 'testing') {
            const q = state.questions[state.currentQIndex];
            const qNumClean = q.qNum.toUpperCase();
            
            let qTitle = `Question ${state.currentQIndex + 1} of ${state.questions.length} (${q.moduleId} - ${qNumClean})`;
            let infoStr = '';
            
            if (state.mode === 'practice') {
                if (q.occurrences) {
                    infoStr = `<span style="color:#666">Freq: ${q.frequency} / ${q.occurrences.join(' / ')}</span>`;
                }
            } else if (state.mode === 'mock') {
                infoStr = `
                    <div style="display:flex; align-items:center; gap: 10px;">
                        <span id="timer-txt" style="width:45px; font-size:15px; text-align:right">${state.timeHidden ? '' : formatTime(state.timeRemaining)}</span>
                        <div style="cursor:pointer; display:flex; align-items:center; gap:4px; color:#326b70" onclick="state.timeHidden = !state.timeHidden; render();">
                            ${state.timeHidden ? iconEyeOff : iconEye} 
                            ${state.timeHidden ? 'Show Time' : 'Hide Time'}
                        </div>
                    </div>`;
            }

            sub = `
                <div class="sub-bar">
                    <div>Writing | ${qTitle}</div>
                    ${infoStr}
                </div>
            `;
        } else if (state.screen === 'intro' || state.screen === 'end') {
            sub = `<div class="sub-bar"><div>Writing</div></div>`;
        }

        return top + sub;
    }

    // 修复 3：做题界面空格消除，标点符号紧密贴合
    function renderQuestion() {
        const q = state.questions[state.currentQIndex];
        const answers = state.answers[q.id];

        let sentenceHtml = '';
        let prevWasBlank = false;
        q.structure.forEach((slot, sIdx) => {
            if (slot.type === 'static') {
                let textToShow = slot.text;
                // 标点符号紧贴前面拖入的选项
                if (prevWasBlank && /^[.,?!;:’”)\]]/.test(textToShow.trim())) {
                    textToShow = textToShow.trimStart();
                }
                sentenceHtml += `<span class="static-word">${textToShow}</span>`;
                prevWasBlank = false;
            } else {
                prevWasBlank = true;
                const filledOptId = answers[slot.id];
                const filledOpt = filledOptId ? q.options.find(o => o.id === filledOptId) : null;
                
                if (filledOpt) {
                    let textToShow = filledOpt.text;
                    if (sIdx === 0) textToShow = textToShow.charAt(0).toUpperCase() + textToShow.slice(1);
                    
                    let colorStyle = "color: #000;";
                    if (state.checkActive && state.mode === 'practice') {
                        const isCorrect = (q.correctAnswers[slot.id] === filledOpt.id);
                        colorStyle = isCorrect ? "color: #10b981; font-weight: bold;" : "color: #ef4444; font-weight: bold; text-decoration: underline;";
                    }

                    // 完全去掉了换行与多余空格
                    sentenceHtml += `<span class="filled-word" style="${colorStyle}" draggable="${!state.testFinished}" onclick="handleSlotClick('${slot.id}')" ondragstart="onDragStart(event, '${filledOpt.id}', '${slot.id}')" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDropSlot(event, '${slot.id}')">${textToShow}</span>`;
                } else {
                    sentenceHtml += `<span class="drop-slot text-transparent" id="slot_${slot.id}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDropSlot(event, '${slot.id}')">________</span>`;
                }
            }
        });

        const usedOptIds = Object.values(answers);
        const availOpts = q.options.filter(o => !usedOptIds.includes(o.id));
        
        let poolHtml = '';
        availOpts.forEach(opt => {
            poolHtml += `<div class="pool-option" draggable="${!state.testFinished}" onclick="handleOptionClick('${opt.id}')" ondragstart="onDragStart(event, '${opt.id}')" ondragend="onDragEnd(event)">${opt.text}</div>`;
        });

        return `
            <div class="app-container shadow-xl">
                ${renderTopBar()}
                <div class="question-area flex-1">
                    <h2 style="font-size: 26px; font-weight: bold; margin-bottom: 70px; color:#111">Make an appropriate sentence.</h2>
                    
                    <div style="width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 50px;">
                        <div style="display: flex; align-items: center; gap: 30px;">
                            <img src="${q.avatar1}" style="width: 110px; height: 110px; object-fit: contain;">
                            <div style="font-size: 20px; color: #111;">${q.topText}</div>
                        </div>
                        
                        <div style="display: flex; align-items: flex-start; gap: 30px;">
                            <img src="${q.avatar2}" style="width: 110px; height: 110px; object-fit: contain;">
                            <div class="sentence-flow" style="flex:1; padding-top: 10px;">
                                ${sentenceHtml}
                            </div>
                        </div>
                    </div>

                    <div id="options-pool" style="margin-top: 80px; width: 100%; max-width: 900px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-start; min-height:60px" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDropPool(event)">
                        ${poolHtml}
                    </div>
                    
                    ${(state.showAnswerOverlay || state.checkActive) && state.mode === 'practice' ? `
                        <div style="margin-top: 40px; padding: 24px 32px; background: #fcfdfd; border: 1px solid #e2e8f0; border-radius: 12px; width: 100%; max-width: 900px; box-shadow: 0 4px 6px rgba(0,0,0,0.02)">
                            <h3 style="font-weight:800; margin-bottom:12px; color:#64748b; font-size:13px; text-transform:uppercase; letter-spacing:0.5px">Correct Answer</h3>
                            <p style="font-size:20px; line-height: 2.2; color:#111">
                                ${(() => {
                                    let correctStr = "";
                                    let prevWasBlankForCorrect = false;
                                    q.structure.forEach((s, sIdx) => {
                                        if (s.type === 'static') {
                                            let textToShow = s.text;
                                            if (prevWasBlankForCorrect && /^[.,?!;:’”)\]]/.test(textToShow.trim())) {
                                                textToShow = textToShow.trimStart();
                                            }
                                            correctStr += `<span style="color: #333; font-weight: normal;">${textToShow}</span>`;
                                            prevWasBlankForCorrect = false;
                                        } else {
                                            prevWasBlankForCorrect = true;
                                            let w = q.options.find(o => o.id === q.correctAnswers[s.id]).text;
                                            if (sIdx === 0) w = w.charAt(0).toUpperCase() + w.slice(1);
                                            correctStr += `<span style="color: #10b981; font-weight: bold;">${w}</span>`;
                                        }
                                    });
                                    return correctStr;
                                })()}
                            </p>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }

    function renderReviewGrid() {
        let rows = state.questions.map((q, i) => {
            const ansCount = Object.keys(state.answers[q.id]).length;
            const blankCount = q.structure.filter(s => s.type === 'blank').length;
            let status = "Not Answered";
            if (ansCount === blankCount) status = "Answered";
            else if (ansCount > 0 && state.mode === 'practice') status = "Partially Answered";
            return { index: i, number: i + 1, status: status };
        });

        rows.sort((a, b) => {
            let va = a[state.sortConfig.key], vb = b[state.sortConfig.key];
            if(va < vb) return state.sortConfig.direction === 'asc' ? -1 : 1;
            if(va > vb) return state.sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
        });

        const arr = state.sortConfig.direction === 'asc' ? '▲' : '▼';
        const getTh = (k, label) => `<th onclick="sortReview('${k}')"><div style="display:flex; justify-content:space-between; align-items:center;"><span>${label}</span><span style="font-size:10px;color:#999">${state.sortConfig.key===k?arr:'↕'}</span></div></th>`;

        return `
            <div class="app-container w-full h-screen overflow-hidden shadow-xl flex flex-col">
                <div class="top-bar flex justify-end items-center" style="background-color: var(--primary-bg); height: 80px;">
                    <div class="flex gap-3">
                        <button class="tpo-btn btn-outline" onclick="handleReturnFromReview()">‹ Return</button>
                        ${state.selectedReviewRow !== null && !state.testFinished ? `<button class="tpo-btn btn-solid" style="color: var(--primary-bg);" onclick="state.screen='testing'; state.currentQIndex=${state.selectedReviewRow}; render();">Go To Question</button>` : ''}
                    </div>
                </div>
                
                <div class="review-table-container flex-1">
                    <h2 style="font-size: 26px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; color: #111; font-weight: normal;">Review</h2>
                    <p style="font-size: 15px; color: #444; margin-bottom: 15px; line-height: 1.6;">The following is a list of questions in this part of the test. When you enter Review, the question you were on is selected and highlighted. The Status column shows if a question has been Answered, Partially Answered, Not Answered, or Not Encountered.</p>
                    <p style="font-size: 15px; color: #444; margin-bottom: 15px; line-height: 1.6;">To review a specific question from the list, select the question to highlight it, then select <strong>Go to question</strong>. To sort the list by number or status, select the column heading. When there are more questions than will fit on screen, you can use the scroll bar to access the others.</p>
                    <p style="font-size: 15px; color: #444; margin-bottom: 25px; line-height: 1.6;">To leave Review and return to where you were in the test, select <strong>Return</strong>.</p>
                    
                    <table class="review-table">
                        <thead>
                            <tr>${getTh('number', 'Number')}${getTh('status', 'Status')}</tr>
                        </thead>
                        <tbody>
                            ${rows.map(r => `
                                <tr class="${state.selectedReviewRow === r.index ? 'selected' : ''}" onclick="state.selectedReviewRow=${r.index}; render();">
                                    <td style="font-weight:bold; width: 30%; font-size:15px">${r.number}</td>
                                    <td style="font-size:15px">${r.status}</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('toefl_history') || '[]');
        let html = `
            <div class="w-full min-h-screen bg-[#f4f6f8] p-10 font-sans">
                <div class="max-w-[1200px] mx-auto bg-white p-10 rounded-2xl shadow-sm">
                    <div class="flex justify-between items-center border-b pb-6 mb-4">
                        <h2 class="text-3xl font-bold text-[#111]">做题历史记录</h2>
                        <button onclick="state.screen='dashboard'; render()" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-full font-bold hover:bg-gray-200 transition">返回主界面</button>
                    </div>
        `;
        
        if(history.length === 0) {
            html += `<div class="p-10 text-center text-gray-500">暂无历史记录</div>`;
        } else {
            history.forEach(r => {
                const isMock = r.mode === 'mock';
                const timeStr = isMock ? `用时: ${formatTime(r.timeSpent)}` : '不计时';
                html += `
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center hover:bg-gray-50 transition cursor-pointer" onclick="viewHistoryDetail('${r.id}')">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-2 py-1 text-xs rounded font-bold ${isMock ? 'bg-[#f0ebff] text-[#4f46e5]' : 'bg-[#ecfdf5] text-[#10b981]'}">${isMock ? '模考' : '练习'}</span>
                                <span class="font-bold text-lg text-gray-800">${r.dateStr}</span>
                                <span class="text-sm text-gray-500 ml-2">(${r.moduleId || 'Mixed'})</span>
                            </div>
                            <div class="text-sm text-gray-500">得分: <strong class="${r.score === r.total ? 'text-green-500' : 'text-red-500'}">${r.score}</strong> / ${r.total} &nbsp;&nbsp;|&nbsp;&nbsp; ${timeStr}</div>
                        </div>
                        <div class="text-[#276b70] font-bold text-sm flex items-center gap-1">查看详情 &rsaquo;</div>
                    </div>
                `;
            });
        }
        html += `</div></div>`;
        return html;
    }

    function renderHistoryDetail() {
        const record = state.currentHistoryRecord;
        if(!record) return renderHistory();

        let html = `
            <div class="w-full min-h-screen bg-[#f4f6f8] p-10 pb-20 font-sans">
                <div class="max-w-[1200px] mx-auto">
                    <div class="bg-white p-8 rounded-2xl shadow-sm mb-6 flex justify-between items-center border border-gray-100">
                        <div>
                            <h2 class="text-2xl font-bold text-[#111] mb-2">${record.dateStr} (${record.mode === 'mock' ? '模考' : '练习'})</h2>
                            <p class="text-gray-500 text-[15px]">得分: <strong class="text-[#276b70] text-lg">${record.score}</strong> / ${record.total} | 模块：${record.moduleId}</p>
                        </div>
                        <div class="flex gap-3">
                            <button class="bg-gray-100 text-gray-700 px-5 py-2.5 rounded-full font-bold hover:bg-gray-200 text-sm transition" onclick="state.screen='history'; render()">‹ Back</button>
                            <button class="bg-white border border-gray-300 text-gray-700 px-5 py-2.5 rounded-full font-bold hover:bg-gray-50 text-sm transition" onclick="downloadTXT()">Download TXT</button>
                            ${record.mode === 'mock' ? `<button class="bg-[#4f46e5] text-white px-5 py-2.5 rounded-full font-bold hover:bg-[#4338ca] text-sm transition" onclick="startMock('${record.moduleId}')">Redo Full Set</button>` : ''}
                        </div>
                    </div>
        `;

        record.questions.forEach((q, idx) => {
            let isCorrect = true;
            let userStr = "", correctStr = "";
            let timeForQ = record.timeSpentPerQ ? record.timeSpentPerQ[q.id] || 0 : 0;
            
            let prevWasBlankForUser = false;
            q.structure.forEach((slot, sIdx) => {
                if(slot.type === 'static') {
                    let textToShow = slot.text;
                    if (prevWasBlankForUser && /^[.,?!;:’”)\]]/.test(textToShow.trim())) {
                        textToShow = textToShow.trimStart();
                    }
                    userStr += `<span class="text-gray-700">${textToShow}</span>`; 
                    prevWasBlankForUser = false;
                } else {
                    prevWasBlankForUser = true;
                    const ansId = record.answers[q.id][slot.id];
                    const isSlotCorrect = (ansId === q.correctAnswers[slot.id]);
                    if(!isSlotCorrect) isCorrect = false;

                    const opt = q.options.find(o => o.id === ansId);
                    let w = opt ? opt.text : "";
                    if(sIdx === 0 && w) w = w.charAt(0).toUpperCase() + w.slice(1);
                    
                    if (w) {
                        if (isSlotCorrect) {
                            userStr += `<span class="font-bold text-emerald-600 border-b-2 border-emerald-500 pb-0.5 inline-block">${w}</span>`;
                        } else {
                            userStr += `<span class="font-bold text-red-500 border-b-2 border-red-500 pb-0.5 inline-block">${w}</span>`;
                        }
                    } else {
                        userStr += `<span class="inline-block w-16 border-b-2 border-dashed border-red-400 mx-1 align-middle pb-0.5" style="height: 1.2em;"></span>`;
                    }
                }
            });

            let prevWasBlankForCorrect = false;
            q.structure.forEach((slot, sIdx) => {
                if(slot.type === 'static') {
                    let textToShow = slot.text;
                    if (prevWasBlankForCorrect && /^[.,?!;:’”)\]]/.test(textToShow.trim())) {
                        textToShow = textToShow.trimStart();
                    }
                    correctStr += `<span class="text-gray-700">${textToShow}</span>`;
                    prevWasBlankForCorrect = false;
                } else {
                    prevWasBlankForCorrect = true;
                    const cOptId = q.correctAnswers[slot.id];
                    const cOpt = q.options.find(o => o.id === cOptId);
                    let cw = cOpt ? cOpt.text : "________";
                    if(sIdx === 0 && cOpt) cw = cw.charAt(0).toUpperCase() + cw.slice(1);
                    correctStr += `<span class="font-bold text-emerald-600 border-b-2 border-emerald-500 pb-0.5 inline-block">${cw}</span>`;
                }
            });

            let timeTag = record.mode === 'mock' ? `
                <div class="text-xs text-gray-400 font-semibold flex items-center gap-1">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    耗时: ${formatTime(timeForQ)}
                </div>` : '';

            html += `
                <div class="bg-white p-8 rounded-2xl shadow-sm mb-6 border-l-[6px] ${isCorrect ? 'border-emerald-500' : 'border-red-500'} relative border border-gray-100">
                    <button class="absolute top-6 right-6 text-[#276b70] font-bold text-sm hover:underline" onclick="redoQuestionFromHistory('${record.id}', ${idx})">Redo Question</button>
                    
                    <div class="flex items-center gap-4 mb-4">
                        <div class="text-sm text-gray-400 font-extrabold uppercase tracking-wider">${q.moduleId} - ${q.qNum.toUpperCase()} (Question ${idx + 1})</div>
                        <div class="text-xs px-2.5 py-1 rounded-md font-bold ${isCorrect ? 'bg-[#ecfdf5] text-emerald-600' : 'bg-[#fef2f2] text-red-500'}">${isCorrect ? 'CORRECT' : 'INCORRECT'}</div>
                        ${timeTag}
                    </div>
                    
                    <div class="text-[17px] text-gray-800 mb-6 font-semibold">${q.topText}</div>
                    
                    <div class="mb-4 bg-gray-50 p-5 rounded-2xl border border-gray-100">
                        <span class="text-[11px] font-black text-gray-400 uppercase tracking-widest block mb-2">Your Answer:</span>
                        <div class="text-[19px] leading-loose">${userStr}</div>
                    </div>
                    
                    ${!isCorrect ? `
                    <div class="mb-2 bg-[#f0fdf4] p-5 rounded-2xl border border-[#d1fae5]">
                        <span class="text-[11px] font-black text-emerald-600 uppercase tracking-widest block mb-2">Correct Answer:</span>
                        <div class="text-[19px] leading-loose">${correctStr}</div>
                    </div>
                    ` : ''}
                </div>
            `;
        });

        html += `</div></div>`;
        return html;
    }

    function renderTextPage(title, lines) {
        return `
            <div class="app-container shadow-xl flex flex-col h-screen">
                ${renderTopBar()}
                <div style="padding: 100px 100px; flex:1">
                    <h2 style="font-size: 30px; font-weight:normal; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; color:#111">${title}</h2>
                    ${lines.map(l => `<p style="font-size: 16px; color: #333; margin-bottom: 25px;">${l}</p>`).join('')}
                </div>
            </div>`;
    }

    function render() {
        mainBody.className = (state.screen === 'dashboard' || state.screen === 'practice_setup' || state.screen === 'mock_calendar' || state.screen === 'history' || state.screen === 'history_detail' || state.screen === 'upload' || state.screen === 'data_dashboard') ? '' : 'exam-body';

        if (state.screen === 'upload') appEl.innerHTML = renderUpload();
        else if (state.screen === 'dashboard') appEl.innerHTML = renderDashboard();
        else if (state.screen === 'data_dashboard') appEl.innerHTML = renderDataDashboard();
        else if (state.screen === 'practice_setup') appEl.innerHTML = renderPracticeSetup();
        else if (state.screen === 'mock_calendar') appEl.innerHTML = renderMockCalendar();
        else if (state.screen === 'history') appEl.innerHTML = renderHistory();
        else if (state.screen === 'history_detail') appEl.innerHTML = renderHistoryDetail();
        else if (state.screen === 'intro') appEl.innerHTML = renderTextPage("Build a Sentence", ["Move the words in the boxes to create grammatical sentences.", "In an actual test, a clock will show you how much time you have to complete this task."]);
        else if (state.screen === 'end') appEl.innerHTML = renderTextPage("End of Writing Section", ["Thank you for completing the writing section."]);
        else if (state.screen === 'testing' || state.screen === 'post_review') appEl.innerHTML = renderQuestion();
        else if (state.screen === 'review_grid') appEl.innerHTML = renderReviewGrid();
    }

    window.onload = () => render();

    window.startPractice = startPractice;
    window.startMock = startMock;
    window.beginExam = beginExam;
    window.checkAnswer = checkAnswer;
    window.finishExam = finishExam;
    window.exitPractice = exitPractice;
    window.goNext = goNext;
    window.goBack = goBack;
    window.goToReview = goToReview;
    window.handleReturnFromReview = handleReturnFromReview;
    window.sortReview = sortReview;
    window.render = render;
    window.handleOptionClick = handleOptionClick;
    window.handleSlotClick = handleSlotClick;
    window.onDragStart = onDragStart;
    window.onDragEnd = onDragEnd;
    window.onDragOver = onDragOver;
    window.onDragLeave = onDragLeave;
    window.onDropSlot = onDropSlot;
    window.onDropPool = onDropPool;
    window.handleFile = handleFile;
    window.onFileDrop = onFileDrop;
    window.downloadTXT = downloadTXT;
    window.viewHistoryDetail = viewHistoryDetail;
    window.redoQuestionFromHistory = redoQuestionFromHistory;
    window.fetchDataFromCloud = fetchDataFromCloud;

    function fetchDataFromCloud() {
        const btn = document.getElementById('cloud-sync-btn');
        const originalHtml = btn.innerHTML;
        
        // 变成加载状态
        btn.innerHTML = `
            <div class="text-[#3b82f6] font-bold text-lg animate-pulse flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-[#3b82f6] mb-3" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                正在同步云端题库数据...
            </div>
        `;

        const timestamp = new Date().getTime();
        const primaryUrl = `./output.md?t=${timestamp}`; // 优先：直连 GitHub Pages
        const fallbackUrl = `https://fastly.jsdelivr.net/gh/yuyu1221-7/toefl-practice@main/output.md?t=${timestamp}`; // 备用：CDN 加速

        // 第一次尝试：直连
        fetch(primaryUrl)
            .then(response => {
                if (!response.ok) throw new Error('直连访问失败');
                return response.text();
            })
            .then(text => {
                console.log("使用直连线路加载成功");
                parseMDData(text);
            })
            .catch(primaryError => {
                console.warn("直连超时或被阻断，正在无缝切换至 CDN 加速节点...", primaryError);
                
                // 第二次尝试：如果直连失败，触发备用 CDN 线路
                fetch(fallbackUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('CDN 加速节点也访问失败');
                        return response.text();
                    })
                    .then(text => {
                        console.log("使用 CDN 加速线路加载成功");
                        parseMDData(text);
                    })
                    .catch(fallbackError => {
                        // 两条路都死胡同了，才向用户报错
                        alert('【同步失败】\n网络状况不佳，直连与加速线路均无法获取数据。请确认 output.md 是否已上传至 GitHub 仓库。');
                        btn.innerHTML = originalHtml; // 恢复按钮原状
                    });
            });
    }

</script>
