            for (let i = 1; i <= 20; i++) barsHtml += `<div class="volume-bar" id="vbar-${i}" style="height: ${20 + (i / 20) * 80}%"></div>`;
            volumeBars.innerHTML = barsHtml;

            function updateVolumeVisuals() {
                let val = volumeSlider.value;
                let activeCount = Math.ceil((val / 100) * 20);
                for (let i = 1; i <= 20; i++) {
                    let bar = document.getElementById('vbar-' + i);
                    if (i <= activeCount) bar.classList.add('active');
                    else bar.classList.remove('active');
                }
                volumeSlider.style.background = `linear-gradient(to right, #2b6668 ${val}%, #d3d3d3 ${val}%)`;
            }

            volumeSlider.addEventListener('input', updateVolumeVisuals);
            volumeSlider.addEventListener('change', () => playBeep(volumeSlider.value));
            updateVolumeVisuals();

            btnVolume.addEventListener('click', (e) => { e.stopPropagation(); volumePanel.classList.toggle('active'); });
            document.getElementById('volume-close').addEventListener('click', (e) => { e.stopPropagation(); volumePanel.classList.remove('active'); });
            document.addEventListener('click', (e) => { if (!volumePanel.contains(e.target) && !btnVolume.contains(e.target)) volumePanel.classList.remove('active'); });

            // Other bindings
            if (isAnswerReviewMode) {
                document.getElementById('btn-toggle-answer').addEventListener('click', () => {
                    answersRevealed = !answersRevealed;
                    renderCurrentScreen(true);
                });
                document.getElementById('btn-back-to-results').addEventListener('click', () => {
                    isAnswerReviewMode = false;
                    currentIndex = testData.length - 1; // Return to the results screen
                    renderCurrentScreen();
                });
            } else if (isReviewMode) {
                document.getElementById('btn-go-to-question').addEventListener('click', () => {
                    if (selectedReviewIndex !== null) { isReviewMode = false; currentIndex = selectedReviewIndex; renderCurrentScreen(); }
                });
                document.getElementById('btn-return').addEventListener('click', () => { isReviewMode = false; renderCurrentScreen(); });
            } else if (!isResult) {
                const btnReview = document.getElementById('btn-review');
                if (btnReview) btnReview.addEventListener('click', () => { isReviewMode = true; selectedReviewIndex = null; renderCurrentScreen(); });

                const btnBack = document.getElementById('btn-back');
                if (btnBack) btnBack.addEventListener('click', () => { if (!disableBack && currentIndex > 0) { currentIndex--; renderCurrentScreen(); } });

                document.getElementById('btn-next').addEventListener('click', () => {
                    if (currentIndex < testData.length - 1) {
                        currentIndex++;
                        if (testData[currentIndex].module !== currentModule && testData[currentIndex].module === 2) {
                            timeRemaining = 9 * 60; // 9 minutes for M2
                        }
                        currentModule = testData[currentIndex].module;
                        renderCurrentScreen();
                    }
                });
            }
        }

        function renderCurrentScreen(preserveScroll = false) {
            let lastLeftScroll = 0, lastRightScroll = 0;
            if (preserveScroll) {
                const lp = document.querySelector('.left-pane'), rp = document.querySelector('.right-pane');
                if (lp) lastLeftScroll = lp.scrollTop;
                if (rp) lastRightScroll = rp.scrollTop;
            }

            renderHeaderButtons();

            if (isReviewMode) return renderReviewScreen();

            const data = testData[currentIndex];

            if (data.status === 'Not Seen' && data.type !== 'end-screen' && data.type !== 'intro-screen' && data.type !== 'result-screen') {
                data.status = 'Not Answered';
            }

            const timerContainer = document.getElementById('timer-container');
            if (data.type === 'intro-screen' || data.type === 'end-screen' || data.type === 'result-screen') {
                timerContainer.style.visibility = 'hidden';
                isTimerRunning = false;
            } else {
                timerContainer.style.visibility = 'visible';
                isTimerRunning = true;
            }

            document.getElementById('section-info').textContent = data.range ? `| ${data.range}` : '';
            const contentBox = document.getElementById('content-box');
            contentBox.innerHTML = '';

            if (data.type === 'intro-screen' || data.type === 'end-screen') {
                const container = document.createElement('div');
                container.className = 'single-layout';
                container.innerHTML = data.content;
                contentBox.appendChild(container);
                return;
            }

            if (data.type === 'result-screen') {
                renderResultScreen(contentBox);
                return;
            }

            if (data.title) {
                const titleEl = document.createElement('div');
                titleEl.className = 'question-title';
                titleEl.innerHTML = data.title;
                contentBox.appendChild(titleEl);
            }

            if (data.type === 'fill-in-blanks') {
                const container = document.createElement('div');
                container.className = 'single-layout';

                const blanksData = [];
                let tempText = data.content;
                tempText = tempText.replace(/([a-zA-Z0-9\-\']*)\[([^\]]+)\]([a-zA-Z0-9\-\']*)/g, (match, prefix, ans, suffix) => {
                    blanksData.push({ prefix, ans, suffix });
                    return `\u200B__BLANK_${blanksData.length - 1}__\u200B`;
                });

                if (!data.answers) data.answers = new Array(blanksData.length).fill('');

                tempText = tempText.replace(/([(\["']?)\u200B__BLANK_(\d+)__\u200B([.,;:!?')\]]*)/g, (match, prePunct, idx, postPunct) => {
                    const d = blanksData[parseInt(idx)];
                    const ansLen = d.ans.length;
                    const inputWidth = `calc(${ansLen} * 1.3ch)`;
                    let html = `<span class="inline-fill-wrap" style="display:inline-block;white-space:nowrap;">`;
                    if (prePunct) html += prePunct;
                    html += d.prefix || '';
                    const savedVal = (data.answers && data.answers[parseInt(idx)]) ? data.answers[parseInt(idx)].replace(/"/g, '&quot;') : '';
                    const initClass = savedVal ? 'fill-blank-input is-filled' : 'fill-blank-input is-empty';

                    if (isAnswerReviewMode && answersRevealed) {
                        let isCorr = savedVal.toLowerCase() === d.ans.toLowerCase();
                        if (savedVal === '') {
                            html += `<input type="text" maxlength="${ansLen}" value="${d.ans}" class="fill-blank-input is-filled" style="width:${inputWidth}; color: #888; font-weight: bold;" readonly />`;
                        } else if (isCorr) {
                            html += `<input type="text" maxlength="${ansLen}" value="${savedVal}" class="${initClass}" style="width:${inputWidth}; color: #34a853; font-weight: bold;" readonly />`;
                        } else {
                            html += `<input type="text" maxlength="${ansLen}" value="${savedVal}" class="${initClass}" style="width:${inputWidth}; color: #ea4335; font-weight: bold; text-decoration: line-through;" readonly />`;
                            html += `<span style="color: #34a853; font-weight: bold; margin-left: 5px;">${d.ans}</span>`;
                        }
                    } else if (isAnswerReviewMode && !answersRevealed) {
                        html += `<input type="text" maxlength="${ansLen}" value="${savedVal}" class="${initClass}" style="width:${inputWidth};" readonly />`;
                    } else {
                        html += `<input type="text" maxlength="${ansLen}" data-answer="${d.ans}" data-idx="${idx}" value="${savedVal}" class="${initClass}" style="width:${inputWidth}" autocomplete="off" spellcheck="false" />`;
                    }

                    if (d.suffix) html += d.suffix;
                    if (postPunct) html += postPunct;
                    html += `</span>`;
                    return html;
                });

                const passageEl = document.createElement('div');
                passageEl.className = 'passage-fill-text';
                passageEl.innerHTML = tempText;
                container.appendChild(passageEl);
                contentBox.appendChild(container);

                const inputs = container.querySelectorAll('.fill-blank-input');
                setTimeout(() => {
                    if (!isAnswerReviewMode && !isReviewMode && inputs.length > 0) {
                        inputs[0].focus();
                    }
                }, 100);

                inputs.forEach((input, i) => {
                    function updateState(el) {
                        if (el.value.trim() === '') { el.classList.add('is-empty'); el.classList.remove('is-filled'); }
                        else { el.classList.remove('is-empty'); el.classList.add('is-filled'); }
                    }

                    function adjustWidth(el) {
                        if (el.value.trim() !== '' && document.activeElement !== el) {
                            const span = document.createElement('span');
                            span.style.fontFamily = 'inherit';
                            span.style.fontSize = '16px';
                            span.style.visibility = 'hidden';
                            span.style.whiteSpace = 'pre';
                            span.style.position = 'absolute';
                            span.textContent = el.value;
                            document.body.appendChild(span);
                            el.style.width = span.getBoundingClientRect().width + 'px';
                            document.body.removeChild(span);
                            el.style.fontFamily = 'inherit';
                            el.style.letterSpacing = 'normal';
                            el.style.fontSize = '16px';
                        } else {
                            el.style.width = `calc(${el.getAttribute('maxlength')} * 1.3ch)`;
                            el.style.fontFamily = 'Consolas, monospace';
                            el.style.letterSpacing = '0.3ch';
                            el.style.fontSize = '16px';
                        }
                    }

                    input.addEventListener('focus', function () { adjustWidth(this); });
                    input.addEventListener('blur', function () { updateState(this); adjustWidth(this); });

                    input.addEventListener('input', function () {
                        const curPos = this.selectionStart;
                        const filtered = this.value.replace(/[^a-zA-Z]/g, '');
                        if (filtered !== this.value) {
                            this.value = filtered;
                            const newPos = Math.max(0, curPos - 1);
                            this.setSelectionRange(newPos, newPos);
                        }
                        const idx = parseInt(this.getAttribute('data-idx'));
                        data.answers[idx] = this.value;
                        updateState(this);

                        const allFilled = Array.from(inputs).every(inp => inp.value.trim() !== '');
                        data.status = allFilled ? 'Answered' : 'Not Answered';
                        if (this.value.length === parseInt(this.getAttribute('maxlength')) && i + 1 < inputs.length) inputs[i + 1].focus();
                    });

                    updateState(input);
                    adjustWidth(input);
                });

                if (isAnswerReviewMode) {
                    inputs.forEach(input => adjustWidth(input));
                }
            }
            else if (data.type === 'multiple-choice-image' || data.type === 'multiple-choice-text') {
                const splitLayout = document.createElement('div');
                splitLayout.className = 'split-layout';

                const leftPane = document.createElement('div'); leftPane.className = 'left-pane';
                leftPane.innerHTML = data.type === 'multiple-choice-image' ? data.imageHtml : data.passage;

                const rightPane = document.createElement('div'); rightPane.className = 'right-pane';
                const qText = document.createElement('div'); qText.style.fontWeight = 'bold'; qText.style.marginBottom = '20px'; qText.innerHTML = data.question;
                rightPane.appendChild(qText);

                data.options.forEach((opt, idx) => {
                    const label = document.createElement('label'); label.className = 'option-label';
                    const radio = document.createElement('input'); radio.type = 'radio'; radio.name = 'question_' + data.id; radio.className = 'option-radio'; radio.value = idx;
                    if (data.answer === idx) radio.checked = true;

                    if (isAnswerReviewMode && answersRevealed) {
                        radio.disabled = true;
                        if (idx === data.correctAnswer) {
                            label.style.backgroundColor = '#e6f4ea';
                            label.style.borderColor = '#34a853';
                        } else if (idx === data.answer && data.answer !== data.correctAnswer) {
                            label.style.backgroundColor = '#fce8e6';
                            label.style.borderColor = '#ea4335';
                        }
                    } else if (isAnswerReviewMode && !answersRevealed) {
                        radio.disabled = true;
                    } else {
                        radio.addEventListener('change', () => { data.answer = idx; data.status = 'Answered'; });
                    }

                    const span = document.createElement('span'); span.textContent = opt;
                    label.appendChild(radio); label.appendChild(span); rightPane.appendChild(label);
                });

                splitLayout.appendChild(leftPane); splitLayout.appendChild(rightPane); contentBox.appendChild(splitLayout);
            }
            else if (data.type === 'insert-text') {
                const splitLayout = document.createElement('div'); splitLayout.className = 'split-layout';
                const leftPane = document.createElement('div'); leftPane.className = 'left-pane'; leftPane.innerHTML = data.passage;
                const rightPane = document.createElement('div'); rightPane.className = 'right-pane'; rightPane.innerHTML = data.question;
                splitLayout.appendChild(leftPane); splitLayout.appendChild(rightPane); contentBox.appendChild(splitLayout);

                const squares = leftPane.querySelectorAll('.insert-square');
                squares.forEach(sq => {
                    if (isAnswerReviewMode && answersRevealed) {
                        if (sq.getAttribute('data-pos') === data.correctAnswer) {
                            sq.outerHTML = `<span class="inserted-text" style="background:rgba(52, 168, 83, 0.15); border:2px solid #34a853; color:#1e293b; padding: 2px 4px; border-radius: 4px;"> ${data.insertSentence} </span>`;
                        } else if (sq.getAttribute('data-pos') === data.answer && data.answer !== data.correctAnswer) {
                            sq.outerHTML = `<span class="inserted-text" style="background:rgba(234, 67, 53, 0.15); border:2px solid #ea4335; color:#1e293b; text-decoration:line-through; padding: 2px 4px; border-radius: 4px;"> ${data.insertSentence} </span>`;
                        }
                    } else if (isAnswerReviewMode && !answersRevealed) {
                        if (data.answer === sq.getAttribute('data-pos')) {
                            sq.outerHTML = `<span class="inserted-text"> ${data.insertSentence} </span>`;
                        }
                    } else {
                        if (data.answer === sq.getAttribute('data-pos')) sq.outerHTML = `<span class="inserted-text"> ${data.insertSentence} </span>`;
                        else sq.addEventListener('click', (e) => { data.answer = e.target.getAttribute('data-pos'); data.status = 'Answered'; renderCurrentScreen(true); });
                    }
                });
            }
            else if (data.type === 'sentence-selection') {
                const splitLayout = document.createElement('div'); splitLayout.className = 'split-layout';
                const leftPane = document.createElement('div'); leftPane.className = 'left-pane'; leftPane.innerHTML = data.passage;
                const rightPane = document.createElement('div'); rightPane.className = 'right-pane'; rightPane.innerHTML = `<div style="font-weight:bold;">${data.question}</div>`;
                splitLayout.appendChild(leftPane); splitLayout.appendChild(rightPane); contentBox.appendChild(splitLayout);

                const sentences = leftPane.querySelectorAll('.selectable-sentence');
                sentences.forEach(sent => {
                    if (data.answer === sent.getAttribute('data-idx')) sent.className = 'selectable-sentence inserted-text';

                    if (isAnswerReviewMode && answersRevealed) {
                        // Determine correctAnswer index
                        let corrIdx = data.correctAnswer !== undefined ? String(data.correctAnswer) : null;
                        if (sent.getAttribute('data-idx') === corrIdx) {
                            sent.style.backgroundColor = 'rgba(52, 168, 83, 0.15)';
                            sent.style.border = '2px solid #34a853';
                            sent.style.color = '#1e293b';
                        } else if (sent.getAttribute('data-idx') === data.answer && data.answer !== corrIdx) {
                            sent.style.backgroundColor = 'rgba(234, 67, 53, 0.15)';
                            sent.style.border = '2px solid #ea4335';
                            sent.style.color = '#1e293b';
                        }
                    } else if (isAnswerReviewMode && !answersRevealed) {
                        // do nothing extra for color
                    } else {
                        sent.addEventListener('click', (e) => {
                            data.answer = e.currentTarget.getAttribute('data-idx'); data.status = 'Answered';
                            sentences.forEach(s => s.className = 'selectable-sentence');
                            e.currentTarget.className = 'selectable-sentence inserted-text';
                        });
                    }
                });
            }

            if (preserveScroll) {
                const lp = document.querySelector('.left-pane'), rp = document.querySelector('.right-pane');
                if (lp) lp.scrollTop = lastLeftScroll; if (rp) rp.scrollTop = lastRightScroll;
            }
        }

        function renderReviewScreen() {
            document.getElementById('section-info').textContent = `| Review`;
            const contentBox = document.getElementById('content-box');
            contentBox.innerHTML = '';

            const container = document.createElement('div'); container.className = 'review-layout';
            const instruction = document.createElement('div'); instruction.className = 'review-instruction';
            instruction.innerHTML = 'To review a specific question from the list, click on the question to highlight it, then click on Go to Question at the top of the screen.';
            container.appendChild(instruction);

            const tableContainer = document.createElement('div'); tableContainer.className = 'review-table-container';
            const table = document.createElement('table'); table.className = 'review-table';
            const thead = document.createElement('thead'); thead.innerHTML = `<tr><th style="width:10%; text-align:center;">Number</th><th style="width:70%;">Description</th><th style="width:20%; text-align:center;">Status</th></tr>`;
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            let displayNum = 1;

            testData.forEach((item, idx) => {
                if (item.module !== currentModule || item.type === 'end-screen' || item.type === 'intro-screen' || item.type === 'result-screen') return;
                const tr = document.createElement('tr');
                if (item.status === 'Answered') tr.classList.add('status-answered');
                if (item.status === 'Not Seen') tr.classList.add('status-not-seen');
                if (selectedReviewIndex === idx) tr.classList.add('selected');

                let disp = item.displayNum || displayNum;
                if (!item.displayNum) displayNum++;
                tr.innerHTML = `<td style="text-align:center;">${disp}</td><td>${item.description}</td><td style="text-align:center;">${item.status}</td>`;
                tr.addEventListener('click', () => { selectedReviewIndex = idx; renderHeaderButtons(); Array.from(tbody.children).forEach(child => child.classList.remove('selected')); tr.classList.add('selected'); });
                tr.addEventListener('dblclick', () => { isReviewMode = false; currentIndex = idx; renderCurrentScreen(); });
                tbody.appendChild(tr);
            });

            table.appendChild(tbody); tableContainer.appendChild(table); container.appendChild(tableContainer); contentBox.appendChild(container);
        }

        function renderResultScreen(contentBox) {
            saveHistory();
            let html = `<div class="transition-page" style="max-width: 900px; padding-bottom: 50px;">
        <h2>Score Report</h2><hr>`;

            // 1. Calculate Scores
            let m1Questions = [];
            let m2Questions = [];

            let m1OgScore = 0; let m1OgTotal = 0;
            let m2OgScore = 0; let m2OgTotal = 0;

            let ogRawTotal = 0;
            let fullRawScore = 0;
            let fullRawTotal = 0;

            testData.forEach((item, idx) => {
                if (item.type === 'intro-screen' || item.type === 'end-screen' || item.type === 'result-screen') return;

                let qRecord = {
                    index: idx,
                    description: item.displayNum || item.description,
                    userAnsStr: 'Not Answered',
                    correctAnsStr: 'N/A',
                    pointsEarned: 0,
                    maxPoints: 1,
                    isExperimental: item.isExperimental || false
                };

                if (item.type === 'fill-in-blanks') {
                    const blanksData = [];
                    item.content.replace(/([a-zA-Z0-9\-\']*)\[([^\]]+)\]([a-zA-Z0-9\-\']*)/g, (match, prefix, ans, suffix) => {
                        blanksData.push(ans); return '';
                    });
                    qRecord.maxPoints = blanksData.length;
                    const uAnsArr = item.answers || [];

                    let correctCount = 0;
                    for (let i = 0; i < blanksData.length; i++) {
                        if (uAnsArr[i] && uAnsArr[i].toLowerCase() === blanksData[i].toLowerCase()) {
                            correctCount++;
                        }
                    }
                    qRecord.pointsEarned = correctCount;
                    qRecord.userAnsStr = uAnsArr.map(x => x ? x : '_').join(', ');
                    qRecord.correctAnsStr = blanksData.join(', ');
                } else {
                    if (item.type === 'multiple-choice-text' || item.type === 'multiple-choice-image') {
                        if (item.answer !== null) qRecord.userAnsStr = String.fromCharCode(65 + item.answer);
                        if (item.correctAnswer !== null && item.correctAnswer !== -1) qRecord.correctAnsStr = String.fromCharCode(65 + item.correctAnswer);
                        if (item.answer === item.correctAnswer) qRecord.pointsEarned = 1;
                    } else if (item.type === 'insert-text') {
                        qRecord.userAnsStr = item.answer || 'None';
                        qRecord.correctAnsStr = item.correctAnswer;
                        if (item.answer === item.correctAnswer) qRecord.pointsEarned = 1;
                    } else if (item.type === 'sentence-selection') {
                        qRecord.userAnsStr = item.answer !== null ? `Sentence ${parseInt(item.answer) + 1}` : 'None';
                        qRecord.correctAnsStr = item.correctAnswer !== undefined ? `Sentence ${parseInt(item.correctAnswer) + 1}` : 'N/A';
                        if (item.answer == item.correctAnswer) qRecord.pointsEarned = 1;
                    }
                }

                fullRawTotal += qRecord.maxPoints;
                fullRawScore += qRecord.pointsEarned;

                if (item.module === 1) {
                    m1Questions.push(qRecord);
                    if (!qRecord.isExperimental) {
                        m1OgScore += qRecord.pointsEarned;
                        m1OgTotal += qRecord.maxPoints;
                        ogRawTotal += qRecord.maxPoints;
                    }
                } else {
                    m2Questions.push(qRecord);
                    if (!qRecord.isExperimental) {
                        m2OgScore += qRecord.pointsEarned;
                        m2OgTotal += qRecord.maxPoints;
                        ogRawTotal += qRecord.maxPoints;
                    }
                }
            });

            let ogTotalScore = m1OgScore + m2OgScore;

            function getScaleScoreAndCEFR(rawPoints) {
                if (rawPoints >= 34) return { scale: '6', cefr: 'C2' };
                if (rawPoints >= 32) return { scale: '5.5', cefr: 'C1' };
                if (rawPoints >= 28) return { scale: '5', cefr: 'C1' };
                if (rawPoints >= 25) return { scale: '4.5', cefr: 'B2' };
                if (rawPoints >= 18) return { scale: '4', cefr: 'B2' };
                if (rawPoints >= 12) return { scale: '3.5', cefr: 'B1' };
                if (rawPoints >= 8) return { scale: '3', cefr: 'B1' };
                if (rawPoints === 7) return { scale: '2.5', cefr: 'A2' };
                if (rawPoints === 6) return { scale: '2', cefr: 'A2' };
                return { scale: '1', cefr: 'A1' };
            }

            let scaledOgScoreTo35 = ogRawTotal > 0 ? Math.round((ogTotalScore / ogRawTotal) * 35) : 0;

            let pointsLost = fullRawTotal - fullRawScore;
            let scaledFullScoreTo35 = Math.max(0, 35 - pointsLost);

            let ogCEFR = getScaleScoreAndCEFR(scaledOgScoreTo35);
            let fullCEFR = getScaleScoreAndCEFR(scaledFullScoreTo35);

            html += `<div style="display:flex; flex-direction:column; gap: 20px; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px;">
        <div style="display:flex; justify-content:space-around; gap: 20px; flex-wrap: wrap;">
            <div style="text-align:center; min-width: 200px;">
                <div style="font-size:2em; font-weight:bold; color:#1a73e8;">${ogCEFR.scale} <span style="font-size:0.5em; color:#666;">/ 6</span></div>
                <div style="font-weight:bold;">Estimated Scale Score <span style="color:#666; font-size:0.8em;">(CEFR: ${ogCEFR.cefr})</span></div>
                <div style="color:#666; font-size:0.9em;">(OG Version)</div>
            </div>
            <div style="text-align:center; min-width: 200px;">
                <div style="font-size:2em; font-weight:bold; color:#34a853;">${ogTotalScore} <span style="font-size:0.5em; color:#666;">/ ${ogRawTotal}</span></div>
                <div style="font-weight:bold;">Scored Raw Points</div>
                <div style="color:#666; font-size:0.9em;">(OG Version)</div>
            </div>
        </div>
        <div style="height:1px; background:#ddd; margin: 10px 0;"></div>
        <div style="display:flex; justify-content:space-around; gap: 20px; flex-wrap: wrap;">
            <div style="text-align:center; min-width: 200px;">
                <div style="font-size:2em; font-weight:bold; color:#ea4335;">${fullCEFR.scale} <span style="font-size:0.5em; color:#666;">/ 6</span></div>
                <div style="font-weight:bold;">Estimated Scale Score <span style="color:#666; font-size:0.8em;">(CEFR: ${fullCEFR.cefr})</span></div>
                <div style="color:#666; font-size:0.9em;">(Full Version)</div>
            </div>
            <div style="text-align:center; min-width: 200px;">
                <div style="font-size:2em; font-weight:bold; color:#f59e0b;">${scaledFullScoreTo35} <span style="font-size:0.5em; color:#666;">/ 35</span></div>
                <div style="font-weight:bold;">Total Raw Points</div>
                <div style="color:#666; font-size:0.9em;">(Full Version)</div>
            </div>
        </div>
    </div>`;

            html += `<div style="text-align:center; margin-bottom: 20px;">
        <p style="font-size: 0.9em; color:#555;"><em>Note: The OG Scoring algorithm automatically excludes the experimental passages/questions from the final score. The "Total Raw Points" evaluates your performance on all items.</em></p>
    </div>`;

            // Render Table Helper
            function renderTable(title, qs, isOgVersion, score, total) {
                let tHtml = `<div style="flex: 1;">
            <h4 style="background:#e8f0fe; padding:10px; border-radius:4px 4px 0 0; margin:0; text-align:center;">${title}</h4>
            <table class="intro-table" style="width:100%; border-top:none;">
            <thead><tr><th>Question</th><th>Correct Answer</th><th>Your Raw Points</th></tr></thead>
            <tbody>`;

                qs.forEach(q => {
                    let isExp = isOgVersion && q.isExperimental;
                    let ptsStr = isExp ? `<span style="color:#888;">0 (unscored)</span>` : `${q.pointsEarned} / ${q.maxPoints}`;
                    let isCorrect = q.pointsEarned === q.maxPoints;
                    let bgColor = isExp ? '#fcfcfc' : (isCorrect ? '#f0fdf4' : '#fef2f2');
                    tHtml += `<tr style="cursor:pointer; background:${bgColor};" onclick="isAnswerReviewMode=true; answersRevealed=true; currentIndex=${q.index}; renderCurrentScreen();">
                <td style="text-align:center;">${q.description}</td>
                <td style="text-align:center;">${q.correctAnsStr}</td>
                <td style="text-align:center; font-weight:bold;">${ptsStr}</td>
            </tr>`;
                });

                tHtml += `<tr style="background:#f1f3f4; font-weight:bold;">
            <td colspan="2" style="text-align:right;">Module Total:</td>
            <td style="text-align:center; color:#1a73e8;">${score} / ${total}</td>
        </tr>`;

                tHtml += `</tbody></table></div>`;
                return tHtml;
            }

            html += `<h3 style="margin-top: 20px; font-size: 1.2em; color: #2b6668;">OG Version (Excludes Experimental)</h3>`;
            html += `<div style="display:flex; gap: 20px;">`;
            html += renderTable('Module 1', m1Questions, true, m1OgScore, m1OgTotal);
            html += renderTable('Module 2', m2Questions, true, m2OgScore, m2OgTotal);
            html += `</div>`;

            let m1FullScore = m1Questions.reduce((a, b) => a + b.pointsEarned, 0);
            let m1FullTotal = m1Questions.reduce((a, b) => a + b.maxPoints, 0);
            let m2FullScore = m2Questions.reduce((a, b) => a + b.pointsEarned, 0);
            let m2FullTotal = m2Questions.reduce((a, b) => a + b.maxPoints, 0);

            html += `<h3 style="margin-top: 40px; font-size: 1.2em; color: #ea4335;">Full Version (Includes All Questions)</h3>`;
            html += `<div style="display:flex; gap: 20px;">`;
            html += renderTable('Module 1', m1Questions, false, m1FullScore, m1FullTotal);
            html += renderTable('Module 2', m2Questions, false, m2FullScore, m2FullTotal);
            html += `</div>`;
            html += `<div style="text-align:center; font-weight:bold; font-size:1.2em; padding:15px; margin-top:20px; background:#e8f0fe; border-radius:4px; color:#1a73e8;">
        Module 1 Total (out of 20) + Module 2 Total (out of 15) = Reading Total (out of 35)
    </div>`;

            html += `</div>`;
            contentBox.innerHTML = html;
        }

        function updateTimer() {
            if (!isTimerRunning || timeRemaining <= 0) return;
            timeRemaining--;
            if (!isTimeHidden) {
                const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
                const s = (timeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').textContent = `${m}:${s}`;
            }
        }

        document.getElementById('btn-hide-time').addEventListener('click', () => {
            isTimeHidden = !isTimeHidden;
            const timerDisplay = document.getElementById('timer-display');
            const hideTimeText = document.getElementById('hide-time-text');
            const eyeIcon = document.getElementById('eye-icon');
            if (isTimeHidden) {
                timerDisplay.style.visibility = 'hidden';
                hideTimeText.textContent = 'Show Time';
                eyeIcon.innerHTML = `<use xlink:href="#icons-show-timer"></use>`;
            } else {
                timerDisplay.style.visibility = 'visible';
                hideTimeText.textContent = 'Hide Time';
                eyeIcon.innerHTML = `<use xlink:href="#icons-hide-timer"></use>`;
                const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
                const s = (timeRemaining % 60).toString().padStart(2, '0');
                timerDisplay.textContent = `${m}:${s}`;
            }
        });
    </script>
</body>

</html>
